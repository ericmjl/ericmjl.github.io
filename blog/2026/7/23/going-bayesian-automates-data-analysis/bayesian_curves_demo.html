function bandTrace(name, color) {
  return {
    x: xg.concat(xg.slice().reverse()),

    line: { color: "transparent", width: 0 },

  return { x: xg, y: name.median, mode: "lines", line: { color: color, width: 2.5, dash: dash || "solid" }, name: name.label };
}
