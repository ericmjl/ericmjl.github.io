<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: monospace; background: #fff; color: #333; display: flex; justify-content: center;
}
.app {
  width: 100%; max-width: 620px; background: #fafafa; border-radius: 8px;
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #ddd;
}
.titlebar { background: #fafafa; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; }
.dot { display: none; }
.titlebar span { margin-left: 0; font-size: 13px; color: #666; }
.instructions { padding: 10px 16px; background: #fafafa; font-size: 12px; color: #666; }
.instructions b { color: #0066cc; }
.chart-area { background: #fff; position: relative; height: 300px; }
svg { display: block; width: 100%; height: 100%; }
.data-pt { cursor: pointer; transition: r 0.15s; }
.data-pt:hover { r: 7; }
.excluded-pt { cursor: pointer; }
.toolbar {
  padding: 8px 16px; background: #fafafa; display: flex; justify-content: space-between;
  align-items: center; font-size: 12px; gap: 10px; border-top: 1px solid #eee;
}
.status-msg { font-family: monospace; font-size: 11px; min-height: 16px; flex: 1; color: #999; }
.status-msg.flash { color: #0066cc; }
.status-msg.warn { color: #e85d3a; }
.counter { font-weight: 700; color: #0066cc; white-space: nowrap; }
.btn {
  background: #fff; color: #666; border: 1px solid #ddd; border-radius: 8px;
  padding: 5px 14px; font-family: monospace; font-size: 12px; cursor: pointer; white-space: nowrap;
}
.btn:hover { border-color: #0066cc; color: #0066cc; }
.btn-primary { background: #0066cc; color: #fff; border-color: #0066cc; }
.btn-primary:hover { background: #005bb5; border-color: #005bb5; color: #fff; }
.meta { padding: 6px 16px; background: #fafafa; font-size: 11px; color: #999; display: flex; justify-content: space-between; border-top: 1px solid #eee; }
.meta b { color: #e85d3a; }
.overlay {
  position: absolute; inset: 0; background: rgba(255,255,255,0.96);
  display: none; align-items: center; justify-content: center; flex-direction: column;
  gap: 12px; padding: 30px; text-align: center; z-index: 30;
}
.overlay .big { font-size: 18px; font-weight: 700; color: #333; line-height: 1.4; }
.overlay .sub { font-size: 13px; color: #666; }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span>Dose-Response Curve Analysis</span>
  </div>
  <div class="instructions">
    Click data points to <b>exclude</b> them from the fit. Click again to restore. Then advance to the next curve.
  </div>
  <div class="chart-area" id="chart-area">
    <svg id="plot" viewBox="0 0 600 300"></svg>
    <div class="overlay" id="overlay">
      <div class="big" id="overlay-big"></div>
      <div class="sub" id="overlay-sub"></div>
      <button class="btn btn-primary" id="overlay-btn" style="margin-top:10px;">Start over</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="status-msg" id="status">Curve 1 loaded.</div>
    <div class="counter">Curve <span id="curve-num">1</span> / 90</div>
    <button class="btn" id="prev-btn">← Prev</button>
    <button class="btn btn-primary" id="next-btn">Next →</button>
  </div>
  <div class="meta">
    <div>Time elapsed: <b id="timer">0:00</b></div>
    <div>Total exclusion decisions: <b id="total-decisions">0</b></div>
    <div>Curves touched: <b id="curves-touched">0</b></div>
  </div>
</div>

<script>
(function() {
  'use strict';
  var SVG_NS = 'http://www.w3.org/2000/svg';
  var svg = document.getElementById('plot');
  var statusEl = document.getElementById('status');
  var curveNumEl = document.getElementById('curve-num');
  var totalDecEl = document.getElementById('total-decisions');
  var curvesTouchedEl = document.getElementById('curves-touched');
  var overlay = document.getElementById('overlay');
  var overlayBig = document.getElementById('overlay-big');
  var overlaySub = document.getElementById('overlay-sub');

  var W = 600, H = 300;
  var M = { top: 12, right: 18, bottom: 32, left: 42 };
  var PW = W - M.left - M.right, PH = H - M.top - M.bottom;
  var xMin = 0.5, xMax = 8.5, yMin = -5, yMax = 105;

  function sx(x) { return M.left + (x - xMin) / (xMax - xMin) * PW; }
  function sy(y) { return M.top + (1 - (y - yMin) / (yMax - yMin)) * PH; }

  function f4pl(x, p) {
    var e = (p[2] - x) * p[3]; if (e > 100) e = 100; if (e < -100) e = -100;
    return p[0] + (p[1] - p[0]) / (1 + Math.pow(10, e));
  }

  // Seeded RNG for reproducible curves
  var seed = 42;
  function rng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }

  function generateCurves(n) {
    var curves = [];
    var trueXs = [1, 2, 3, 4, 5, 6, 7, 8];
    for (var i = 0; i < n; i++) {
      var params = [
        3 + rng() * 8,       // bottom
        88 + rng() * 10,     // top
        3.5 + rng() * 2,     // ec50
        1.0 + rng() * 1.5    // hill
      ];
      var ys = trueXs.map(function(x) {
        return f4pl(x, params) + (rng() - 0.5) * 5;
      });
      var info = { xs: trueXs.slice(), ys: ys, params: params, hasOutlier: false, hasBorderline: false };
      var roll = rng();
      if (roll < 0.55) {
        var oi = Math.floor(rng() * 8);
        ys[oi] += 35 + rng() * 35;
        info.hasOutlier = true;
        info.outlierIdx = oi;
      }
      if (rng() < 0.25) {
        var bi = Math.floor(rng() * 8);
        if (!info.hasOutlier || bi !== info.outlierIdx) {
          ys[bi] += (rng() < 0.5 ? 1 : -1) * (5 + rng() * 8);
          info.hasBorderline = true;
          info.borderlineIdx = bi;
        }
      }
      curves.push(info);
    }
    return curves;
  }

  var allCurves = generateCurves(90);
  // Override curve 11 (index 10): dilution 4 = 100% (glaring inflection-point outlier)
  // Same data used in the two-analysts comparison below
  allCurves[10] = {
    xs: [1, 2, 3, 4, 5, 6, 7, 8],
    ys: [6.9, 7.9, 10.5, 100, 89.5, 91.0, 90.5, 90.8],
    params: [8.9, 90.1, 3.77, 2.48]
  };
  var curveIdx = 0;
  var excluded = [];
  var totalDecisions = 0;
  var curvesTouched = 0;
  var curveHadExclusion = false;
  var timerStart = null, timerInterval = null;
  var timerEl = document.getElementById('timer');
  var prevBtn = document.getElementById('prev-btn');

  function startTimer() {
    if (timerStart) return;
    timerStart = Date.now();
    timerInterval = setInterval(function() {
      var sec = Math.floor((Date.now() - timerStart) / 1000);
      var m = Math.floor(sec / 60), s = sec % 60;
      timerEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }, 1000);
  }
  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
  function getElapsed() { return timerStart ? Math.floor((Date.now() - timerStart) / 1000) : 0; }

  function fit4pl(fxs, fys) {
    var best = [5, 95, 4.5, 1.5], bestSSR = Infinity;
    for (var b = 0; b <= 20; b += 2)
      for (var t = 85; t <= 100; t += 2)
        for (var ec = 2; ec <= 7; ec += 0.2)
          for (var h = 0.3; h <= 4; h += 0.2) {
            var ssr = 0;
            for (var i = 0; i < fxs.length; i++) { var r = fys[i] - f4pl(fxs[i], [b, t, ec, h]); ssr += r * r; }
            if (ssr < bestSSR) { bestSSR = ssr; best = [b, t, ec, h]; }
          }
    return best;
  }

  function getActiveData(d) {
    var ax = [], ay = [];
    for (var i = 0; i < d.xs.length; i++) { if (!excluded[i]) { ax.push(d.xs[i]); ay.push(d.ys[i]); } }
    return { xs: ax, ys: ay };
  }

  var xGrid = []; for (var gx = xMin; gx <= xMax; gx += 0.1) xGrid.push(gx);

  function el(tag, attrs) {
    var e = document.createElementNS(SVG_NS, tag);
    for (var k in attrs) { if (attrs.hasOwnProperty(k)) e.setAttribute(k, attrs[k]); }
    return e;
  }

  function pathFromParams(p) {
    var pts = [];
    for (var i = 0; i < xGrid.length; i++) {
      var y = Math.max(yMin, Math.min(yMax, f4pl(xGrid[i], p)));
      pts.push(sx(xGrid[i]).toFixed(1) + ',' + sy(y).toFixed(1));
    }
    return 'M' + pts.join(' L');
  }

  var curvePath;
  function buildStatic() {
    svg.innerHTML = '';
    svg.appendChild(el('rect', { x: M.left, y: M.top, width: PW, height: PH, fill: '#fff', stroke: '#ddd' }));
    for (var x = 1; x <= 8; x++) svg.appendChild(el('line', { x1: sx(x), y1: M.top, x2: sx(x), y2: M.top + PH, stroke: '#f0f0f0' }));
    for (var y = 0; y <= 100; y += 20) svg.appendChild(el('line', { x1: M.left, y1: sy(y), x2: M.left + PW, y2: sy(y), stroke: '#f0f0f0' }));
    for (var xa = 1; xa <= 8; xa++) { var t = el('text', { x: sx(xa), y: M.top + PH + 16, 'text-anchor': 'middle', 'font-size': 10, fill: '#aaa' }); t.textContent = xa; svg.appendChild(t); }
    for (var ya = 0; ya <= 100; ya += 20) { var t2 = el('text', { x: M.left - 6, y: sy(ya) + 3, 'text-anchor': 'end', 'font-size': 10, fill: '#aaa' }); t2.textContent = ya; svg.appendChild(t2); }
    var xl = el('text', { x: M.left + PW / 2, y: H - 4, 'text-anchor': 'middle', 'font-size': 11, fill: '#999' }); xl.textContent = 'log10(dilution)'; svg.appendChild(xl);
    var yl = el('text', { x: 12, y: M.top + PH / 2, 'text-anchor': 'middle', 'font-size': 11, fill: '#999', transform: 'rotate(-90, 12, ' + (M.top + PH / 2) + ')' }); yl.textContent = '% viability'; svg.appendChild(yl);

    curvePath = el('path', { d: '', fill: 'none', stroke: '#555', 'stroke-width': 2.5, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
    svg.appendChild(curvePath);
  }

  function drawPoints(d) {
    var old = svg.querySelectorAll('.data-pt, .excluded-pt, .excluded-x');
    old.forEach(function(e) { e.remove(); });
    for (var i = 0; i < d.xs.length; i++) {
      if (excluded[i]) {
        var c = el('circle', { cx: sx(d.xs[i]), cy: sy(d.ys[i]), r: 6, fill: '#ccc', stroke: '#999', 'stroke-width': 1, class: 'excluded-pt' });
        svg.appendChild(c);
        svg.appendChild(el('line', { x1: sx(d.xs[i]) - 7, y1: sy(d.ys[i]) - 7, x2: sx(d.xs[i]) + 7, y2: sy(d.ys[i]) + 7, stroke: '#ff5f57', 'stroke-width': 2.5, class: 'excluded-x' }));
        svg.appendChild(el('line', { x1: sx(d.xs[i]) + 7, y1: sy(d.ys[i]) - 7, x2: sx(d.xs[i]) - 7, y2: sy(d.ys[i]) + 7, stroke: '#ff5f57', 'stroke-width': 2.5, class: 'excluded-x' }));
        c.addEventListener('click', function(idx) { return function() { togglePoint(d, idx); }; }(i));
      } else {
        var p = el('circle', { cx: sx(d.xs[i]), cy: sy(d.ys[i]), r: 5, fill: '#2196F3', stroke: '#fff', 'stroke-width': 2, class: 'data-pt' });
        svg.appendChild(p);
        p.addEventListener('click', function(idx) { return function() { togglePoint(d, idx); }; }(i));
      }
    }
  }

  function refit(d) {
    var active = getActiveData(d);
    var params = fit4pl(active.xs, active.ys);
    curvePath.setAttribute('d', pathFromParams(params));
  }

  function togglePoint(d, idx) {
    startTimer();
    excluded[idx] = !excluded[idx];
    totalDecisions++;
    if (!curveHadExclusion) { curveHadExclusion = true; curvesTouched++; }
    totalDecEl.textContent = totalDecisions;
    curvesTouchedEl.textContent = curvesTouched;
    statusEl.className = 'status-msg flash';
    statusEl.textContent = 'Refitting...';
    setTimeout(function() {
      refit(d);
      drawPoints(d);
      var n = excluded.filter(function(e) { return e; }).length;
      statusEl.className = 'status-msg';
      statusEl.textContent = n > 0 ? n + ' point(s) excluded on curve ' + (curveIdx + 1) + '.' : 'All points restored on curve ' + (curveIdx + 1) + '.';
    }, 250);
  }

  var quips = [
    'Curve {n}. Another one.',
    'Curve {n}. Getting tired yet?',
    'Curve {n}. Eyes starting to blur?',
    'Curve {n}. Is this point an outlier? Hard to tell now.',
    'Curve {n}. Are you sure about that call?',
    'Curve {n}. Only {left} more to go.',
    'Curve {n}. A different analyst might disagree with you here.',
    'Curve {n}. Still feeling confident in your calls?',
    'Curve {n}. Halfway done. Maybe.',
    'Curve {n}. Remember: this is one plate of eighteen.',
  ];

  function loadCurve(idx) {
    var d = allCurves[idx];
    excluded = d.xs.map(function() { return false; });
    curveHadExclusion = false;
    curveNumEl.textContent = idx + 1;
    buildStatic();
    refit(d);
    drawPoints(d);

    if (idx === 0) {
      statusEl.className = 'status-msg';
      statusEl.textContent = 'Curve 1. Click any point that looks like an outlier.';
    } else if (idx < 89) {
      statusEl.className = 'status-msg';
      var quip = quips[idx % quips.length].replace('{n}', idx + 1).replace('{left}', 90 - idx - 1);
      statusEl.textContent = quip;
    }
  }

  function showPunchline() {
    stopTimer();
    var reviewed = curveIdx + 1; var sec = getElapsed(); var m = Math.floor(sec / 60), s = sec % 60;
    var timeStr = m + ':' + (s < 10 ? '0' : '') + s;
    overlay.style.display = 'flex';
    if (reviewed >= 90) {
      overlayBig.innerHTML = '90 curves reviewed in ' + timeStr + '.<br>That was one plate of eighteen.<br>And tomorrow you do it again.';
      overlaySub.textContent = totalDecisions + ' manual exclusion decisions. Or you could let the model handle it.';
    } else {
      overlayBig.innerHTML = 'You made it to curve ' + reviewed + ' of 90 in ' + timeStr + '.<br>That\'s ' + totalDecisions + ' judgment calls so far.<br>In a real experiment, you\'d have 18 plates of these.';
      overlaySub.textContent = 'Give up? Or let the model handle it automatically?';
    }
  }

  function updateNavButtons() {
    prevBtn.disabled = (curveIdx === 0);
    prevBtn.style.opacity = (curveIdx === 0) ? '0.4' : '1';
  }

  document.getElementById('next-btn').addEventListener('click', function() {
    startTimer();
    if (curveIdx >= 89) { showPunchline(); return; }
    curveIdx++;
    loadCurve(curveIdx);
    updateNavButtons();
  });

  prevBtn.addEventListener('click', function() {
    if (curveIdx <= 0) return;
    curveIdx--;
    loadCurve(curveIdx);
    updateNavButtons();
  });

  document.getElementById('overlay-btn').addEventListener('click', function() {
    overlay.style.display = 'none';
    curveIdx = 0; totalDecisions = 0; curvesTouched = 0;
    timerStart = null; stopTimer(); timerEl.textContent = '0:00';
    totalDecEl.textContent = '0'; curvesTouchedEl.textContent = '0';
    loadCurve(0);
    updateNavButtons();
  });

  loadCurve(0);
  updateNavButtons();
})();
</script>
</body>
</html>
