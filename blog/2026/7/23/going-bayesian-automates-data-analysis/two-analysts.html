<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; background: #fff; color: #333; display: flex; justify-content: center; }
.app { width: 100%; max-width: 620px; overflow: hidden; background: #fafafa; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.ta-bar { display: flex; padding: 10px 12px; gap: 8px; background: #fafafa; }
.ta-btn { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #666; font-family: monospace; font-size: 13px; cursor: pointer; text-align: left; }
.ta-btn:hover { border-color: #0066cc; }
.ta-btn b { display: block; font-size: 14px; margin-bottom: 2px; color: #333; }
.ta-btn small { font-size: 11px; color: #999; }
.ta-btn.active { background: #0066cc; border-color: #0066cc; color: #fff; }
.ta-btn.active b { color: #fff; }
.ta-btn.active small { color: #cce0f5; }
.ta-chart { background: #fff; height: 280px; }
svg { display: block; width: 100%; height: 100%; }
.ta-result { display: flex; padding: 10px 16px; background: #fafafa; gap: 20px; align-items: center; justify-content: center; border-top: 1px solid #eee; }
.ta-id50 { font-size: 13px; color: #666; }
.ta-id50 b { font-size: 18px; }
.ta-id50.a b { color: #0066cc; }
.ta-id50.b b { color: #e85d3a; }
.ta-vs { color: #999; font-size: 12px; }
.ta-note { padding: 6px 16px 10px; background: #fafafa; text-align: center; font-size: 12px; color: #999; font-style: italic; }
</style>
</head>
<body>
<div class="app">
<div class="ta-bar">
  <button class="ta-btn active" id="ta-btn-a"><b>Analyst A</b><small>Keeps all 8 points (dilution 4 reads 100%)</small></button>
  <button class="ta-btn" id="ta-btn-b"><b>Analyst B</b><small>Excludes dilution 4 (100% is too high for the transition zone)</small></button>
</div>
<div class="ta-chart"><svg id="ta-plot" viewBox="0 0 600 280"></svg></div>
<div class="ta-result">
  <div class="ta-id50 a">Analyst A ID50: <b id="ta-id50-a">4.50</b></div>
  <div class="ta-vs">vs</div>
  <div class="ta-id50 b">Analyst B ID50: <b id="ta-id50-b">4.20</b></div>
</div>
<div class="ta-note" id="ta-note">Same data. Same software. Different answers. Which analyst is right?</div>
</div>
<script>
(function(){
'use strict';
var SVG_NS='http://www.w3.org/2000/svg';
var svg=document.getElementById('ta-plot');
var W=600,H=280,M={top:12,right:18,bottom:32,left:42};
var PW=W-M.left-M.right,PH=H-M.top-M.bottom;
var xMin=0.5,xMax=8.5,yMin=-5,yMax=110;
function sx(x){return M.left+(x-xMin)/(xMax-xMin)*PW;}
function sy(y){return M.top+(1-(y-yMin)/(yMax-yMin))*PH;}
function f4pl(x,p){var e=(p[2]-x)*p[3];if(e>100)e=100;if(e<-100)e=-100;return p[0]+(p[1]-p[0])/(1+Math.pow(10,e));}
function el(t,a){var e=document.createElementNS(SVG_NS,t);for(var k in a){if(a.hasOwnProperty(k))e.setAttribute(k,a[k]);}return e;}
// Exact same curve 11 data as the Dose-Response Curve Analysis demo above.
// Dilution 4 = 100% (glaring outlier at the inflection point, true curve expects ~73%).
var xs=[1,2,3,4,5,6,7,8];
var ys=[6.9, 7.9, 10.5, 100, 89.5, 91.0, 90.5, 90.8];

function fit4pl(fxs,fys){
  var best=[8,90,3.77,2.48],bestSSR=Infinity;
  for(var b=0;b<=20;b+=2)for(var t=85;t<=105;t+=2)for(var ec=2;ec<=7;ec+=0.2)for(var h=0.3;h<=4;h+=0.2){
    var ssr=0;for(var i=0;i<fxs.length;i++){var r=fys[i]-f4pl(fxs[i],[b,t,ec,h]);ssr+=r*r;}
    if(ssr<bestSSR){bestSSR=ssr;best=[b,t,ec,h];}
  }
  return best;
}
function fitExcluding(exSet){
  var fx=[],fy=[];
  for(var i=0;i<xs.length;i++){if(exSet.indexOf(i)<0){fx.push(xs[i]);fy.push(ys[i]);}}
  return fit4pl(fx,fy);
}

var analystA={excluded:[],color:'#0066cc',label:'Analyst A'};
var analystB={excluded:[3],color:'#e85d3a',label:'Analyst B'};
analystA.fit=fitExcluding(analystA.excluded);
analystB.fit=fitExcluding(analystB.excluded);
document.getElementById('ta-id50-a').textContent=analystA.fit[2].toFixed(2);
document.getElementById('ta-id50-b').textContent=analystB.fit[2].toFixed(2);

var xGrid=[];for(var gx=xMin;gx<=xMax;gx+=0.1)xGrid.push(gx);
function pathFromParams(p){
  var pts=[];
  for(var i=0;i<xGrid.length;i++){
    var y=Math.max(yMin,Math.min(yMax,f4pl(xGrid[i],p)));
    pts.push(sx(xGrid[i]).toFixed(1)+','+sy(y).toFixed(1));
  }
  return 'M'+pts.join(' L');
}

function buildStatic(){
  svg.innerHTML='';
  svg.appendChild(el('rect',{x:M.left,y:M.top,width:PW,height:PH,fill:'#fff',stroke:'#ddd'}));
  for(var x=1;x<=8;x++)svg.appendChild(el('line',{x1:sx(x),y1:M.top,x2:sx(x),y2:M.top+PH,stroke:'#f0f0f0'}));
  for(var y=0;y<=100;y+=20)svg.appendChild(el('line',{x1:M.left,y1:sy(y),x2:M.left+PW,y2:sy(y),stroke:'#f0f0f0'}));
  for(var xa=1;xa<=8;xa++){var t=el('text',{x:sx(xa),y:M.top+PH+16,'text-anchor':'middle','font-size':10,fill:'#aaa'});t.textContent=xa;svg.appendChild(t);}
  for(var ya=0;ya<=100;ya+=20){var t2=el('text',{x:M.left-6,y:sy(ya)+3,'text-anchor':'end','font-size':10,fill:'#aaa'});t2.textContent=ya;svg.appendChild(t2);}
  var xl=el('text',{x:M.left+PW/2,y:H-4,'text-anchor':'middle','font-size':11,fill:'#999'});xl.textContent='log10(dilution)';svg.appendChild(xl);
  var yl=el('text',{x:12,y:M.top+PH/2,'text-anchor':'middle','font-size':11,fill:'#999',transform:'rotate(-90, 12, '+(M.top+PH/2)+')'});yl.textContent='% viability';svg.appendChild(yl);
}

function render(analyst){
  buildStatic();
  var curvePath=el('path',{d:pathFromParams(analyst.fit),fill:'none',stroke:analyst.color,'stroke-width':2.5,'stroke-linecap':'round','stroke-linejoin':'round'});
  svg.appendChild(curvePath);

  var ec=analyst.fit[2];
  svg.appendChild(el('line',{x1:sx(ec),y1:M.top,x2:sx(ec),y2:M.top+PH,stroke:analyst.color,'stroke-width':1.5,'stroke-dasharray':'4,3',opacity:0.6}));
  var id50Label=el('text',{x:sx(ec)+4,y:M.top+12,'font-size':9,fill:analyst.color});
  id50Label.textContent='ID50='+ec.toFixed(2);
  svg.appendChild(id50Label);

  for(var i=0;i<xs.length;i++){
    var isEx=analyst.excluded.indexOf(i)>=0;
    if(isEx){
      svg.appendChild(el('circle',{cx:sx(xs[i]),cy:sy(ys[i]),r:5,fill:'#ccc',stroke:analyst.color,'stroke-width':2}));
      svg.appendChild(el('line',{x1:sx(xs[i])-6,y1:sy(ys[i])-6,x2:sx(xs[i])+6,y2:sy(ys[i])+6,stroke:'#ff5f57','stroke-width':2}));
      svg.appendChild(el('line',{x1:sx(xs[i])+6,y1:sy(ys[i])-6,x2:sx(xs[i])-6,y2:sy(ys[i])+6,stroke:'#ff5f57','stroke-width':2}));
    }else{
      svg.appendChild(el('circle',{cx:sx(xs[i]),cy:sy(ys[i]),r:4,fill:'#2196F3',stroke:'#fff','stroke-width':1.5}));
    }
  }
}

var current='a';
render(analystA);

document.getElementById('ta-btn-a').addEventListener('click',function(){
  if(current==='a')return;current='a';
  document.getElementById('ta-btn-a').className='ta-btn active';
  document.getElementById('ta-btn-b').className='ta-btn';
  render(analystA);
});
document.getElementById('ta-btn-b').addEventListener('click',function(){
  if(current==='b')return;current='b';
  document.getElementById('ta-btn-a').className='ta-btn';
  document.getElementById('ta-btn-b').className='ta-btn active';
  render(analystB);
});
})();
</script>
</body>
</html>
