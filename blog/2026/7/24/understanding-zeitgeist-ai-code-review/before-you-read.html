<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: monospace; background: #fff; color: #333; display: flex; justify-content: center; }
.quiz { width: 100%; max-width: 640px; background: #fafafa; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
.q-head { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 16px 8px; border-bottom: 1px solid #eee; }
.q-head h2 { font-size: 15px; font-weight: 700; color: #333; letter-spacing: 0.2px; }
.q-meta { font-size: 12px; color: #999; font-style: italic; }
.q-status { padding: 8px 16px 4px; font-size: 12px; color: #999; font-style: italic; min-height: 34px; line-height: 17px; }
.q-stage { padding: 4px 16px 8px; min-height: 300px; }
.q-q { font-size: 13px; line-height: 1.5; color: #333; margin-bottom: 10px; }
.q-q .q-num { color: #0066cc; font-weight: 700; margin-right: 6px; }
.q-opts { display: flex; flex-direction: column; gap: 6px; }
.q-opt { display: block; width: 100%; text-align: left; padding: 9px 12px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #444; font-family: monospace; font-size: 12.5px; line-height: 1.4; cursor: pointer; transition: border-color .12s, background .12s; }
.q-opt:hover:not(:disabled) { border-color: #0066cc; }
.q-opt:disabled { cursor: default; }
.q-opt .q-key { color: #999; margin-right: 8px; font-weight: 700; }
.q-opt.picked { background: #e6f0fc; border-color: #0066cc; color: #14457a; }
.q-opt.picked .q-key { color: #0066cc; }
.q-opt.picked::after { content: " \2014 your pick"; color: #0066cc; font-weight: 700; }
.q-fb { font-size: 12px; line-height: 1.45; color: #555; padding: 10px 2px 0; min-height: 34px; }
.q-fb .arrow { color: #0066cc; font-weight: 700; margin-right: 4px; }
.q-nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-top: 1px solid #eee; gap: 10px; }
.q-btn { padding: 7px 14px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #666; font-family: monospace; font-size: 12px; cursor: pointer; }
.q-btn:hover:not(:disabled) { border-color: #0066cc; color: #0066cc; }
.q-btn:disabled { opacity: 0.4; cursor: default; }
.q-btn.primary { border-color: #0066cc; color: #0066cc; }
.q-btn.primary:hover:not(:disabled) { background: #0066cc; color: #fff; }
.q-dots { display: flex; gap: 6px; }
.q-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
.q-dot.done { background: #0066cc; }
.q-dot.cur { background: #fff; border: 2px solid #0066cc; box-sizing: border-box; }
.q-foot { padding: 4px 16px 12px; display: flex; justify-content: flex-end; }
</style>
</head>
<body>
<div class="quiz">
  <div class="q-head">
    <h2>Before you read</h2>
    <div class="q-meta">not graded</div>
  </div>
  <div class="q-status" id="status">Pick your honest answer for each card, then advance. No right or wrong is shown here; the survey does the revealing.</div>
  <div class="q-stage" id="stage"></div>
  <div class="q-nav">
    <button class="q-btn" id="back">&#8592; Back</button>
    <div class="q-dots" id="dots"></div>
    <button class="q-btn primary" id="next">Next &#8594;</button>
  </div>
  <div class="q-foot">
    <button class="q-btn" id="reset">Reset</button>
  </div>
</div>
<script>
(function(){
'use strict';
var DATA = [
  { q: "With agents writing much of our code, what's the main thing a human reviewer still adds?",
    opts: ["Catching the bugs the agent missed","Holding the shared mental model that lets the team keep evolving the system","Enforcing style and conventions","Speeding up the merge"],
    tease: "Hold that instinct. The \"Understand to participate\" section takes this question on directly." },
  { q: "You skim a clean-looking agent diff, CI is green, and you approve. What's actually happening?",
    opts: ["Efficient delegation","You're banking cognitive debt","Standard senior practice","Risk-free, because the agent verified it"],
    tease: "The reviewers in this survey have a name for exactly this. See \"What breaks at the pull request\"." },
  { q: "An AI review tool that only returns \"approve\" or \"request changes\" is missing:",
    opts: ["Nothing; that's the whole job","Speed","A way to build your own understanding of the change","Better accuracy"],
    tease: "\"HUDs over copilots\" argues the missing piece is a sense, not a verdict." }
];
var KEYS = ["a","b","c","d"];
var stage = document.getElementById('stage');
var dotsEl = document.getElementById('dots');
var statusEl = document.getElementById('status');
var backBtn = document.getElementById('back');
var nextBtn = document.getElementById('next');
var N = DATA.length;
var cur = 0;
var answered, picks;

function reset(){
  cur = 0;
  answered = DATA.map(function(){return false;});
  picks = DATA.map(function(){return -1;});
  statusEl.textContent = 'Pick your honest answer for each card, then advance. No right or wrong is shown here; the survey does the revealing.';
  statusEl.style.color = '#999';
  buildDots();
  render();
}

function buildDots(){
  dotsEl.innerHTML = '';
  for (var i = 0; i < N; i++) dotsEl.appendChild(document.createElement('span'));
}

function render(){
  var item = DATA[cur];
  var html = '';
  html += '<div class="q-q"><span class="q-num">Q' + (cur+1) + ' of ' + N + '.</span>' + item.q + '</div>';
  html += '<div class="q-opts">';
  item.opts.forEach(function(text, oi){
    var cls = 'q-opt', dis = '';
    if (answered[cur]){ dis = 'disabled'; if (oi === picks[cur]) cls += ' picked'; }
    html += '<button type="button" class="' + cls + '" ' + dis + ' data-i="' + oi + '"><span class="q-key">' + KEYS[oi] + ')</span>' + text + '</button>';
  });
  html += '</div>';
  html += '<div class="q-fb">';
  if (answered[cur]) html += '<span class="arrow">\u2192</span>' + item.tease;
  html += '</div>';
  stage.innerHTML = html;
  if (!answered[cur]){
    var btns = stage.querySelectorAll('.q-opt');
    for (var b = 0; b < btns.length; b++){
      btns[b].addEventListener('click', function(){ pick(parseInt(this.getAttribute('data-i'),10)); });
    }
  }
  var dots = dotsEl.children;
  for (var j = 0; j < N; j++){
    dots[j].className = 'q-dot' + (answered[j] ? ' done' : '') + (j === cur ? ' cur' : '');
  }
  backBtn.disabled = (cur === 0);
  var last = (cur === N - 1);
  if (last){ nextBtn.style.visibility = 'hidden'; }
  else { nextBtn.style.visibility = 'visible'; nextBtn.disabled = !answered[cur]; }
  if (answered.every(function(x){return x;})){
    statusEl.textContent = 'All three locked in. Read on, and notice which of your answers the survey reshapes.';
    statusEl.style.color = '#0066cc';
  }
}

function pick(oi){
  if (answered[cur]) return;
  answered[cur] = true;
  picks[cur] = oi;
  render();
}

backBtn.addEventListener('click', function(){ if (cur > 0){ cur--; render(); } });
nextBtn.addEventListener('click', function(){ if (answered[cur] && cur < N - 1){ cur++; render(); } });
document.getElementById('reset').addEventListener('click', reset);
reset();
})();
</script>
</body>
</html>
